<!DOCTYPE html>
<html lang="en">
<head>

  <title>UtopianX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <img src="logo.png" alt="UtopianX Logo" class="logo">
